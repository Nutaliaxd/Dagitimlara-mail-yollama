<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Mail Gönderimi</title>
  <style>
    :root {
      --bg: #f7f8fa; --card: #fff; --border: #e3e5e8;
      --text: #1f2328; --muted: #6b7280;
      --accent: #1a73e8; --accent-hover: #1558b0;
      --success: #0f9d58; --danger: #d93025;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh; padding: 32px 20px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg); color: var(--text);
    }
    .wrap { max-width: 640px; margin: 0 auto; }
    h1 { font-size: 26px; margin: 0 0 8px; }
    .desc { color: var(--muted); font-size: 14px; line-height: 1.5; margin-bottom: 24px; }
    .card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 10px; padding: 24px; text-align: center;
    }
    .count { font-size: 40px; font-weight: 600; margin-bottom: 4px; }
    .count-label { color: var(--muted); font-size: 13px; margin-bottom: 20px; }
    .big-btn {
      display: inline-block; background: var(--accent); color: #fff;
      border: none; padding: 14px 28px; border-radius: 8px;
      font-size: 16px; font-weight: 500; cursor: pointer;
      transition: background .15s;
    }
    .big-btn:hover { background: var(--accent-hover); }
    .big-btn:disabled { background: #9aa0a6; cursor: default; }
    .note {
      margin-top: 16px; font-size: 12px; color: var(--muted);
      line-height: 1.5;
    }
    .list {
      margin-top: 24px; text-align: left; border-top: 1px solid var(--border);
    }
    .row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 10px 4px; border-bottom: 1px solid var(--border);
      font-size: 13px;
    }
    .row .who { color: var(--text); }
    .row .who small { color: var(--muted); display: block; font-size: 11px; }
    .row button {
      background: #fff; border: 1px solid var(--border); color: var(--text);
      padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 12px;
    }
    .row button:hover { background: #f1f3f5; }
    .row.done button { background: #e7f5ee; border-color: #b6e0c4; color: var(--success); }
    #status { margin-top: 12px; font-size: 12px; color: var(--muted); min-height: 16px; }
    details { margin-top: 16px; }
    summary { color: var(--muted); font-size: 12px; cursor: pointer; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1 id="title">...</h1>
    <p class="desc" id="desc"></p>

    <div class="card">
      <div class="count" id="count">0</div>
      <div class="count-label">hazır mail</div>

      <button id="openAll" class="big-btn">Tüm Mailleri Aç</button>

      <div class="note">
        İlk açılışta tarayıcı pop-up'ları engelleyebilir.
        Adres çubuğundaki uyarıdan bu siteye izin verip butona tekrar bas.
      </div>

      <details>
        <summary>Listeyi göster / tek tek aç</summary>
        <div class="list" id="list"></div>
      </details>

      <div id="status"></div>
    </div>
  </div>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
